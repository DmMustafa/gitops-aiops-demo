apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-user>/gitops-aiops-demo.git
    targetRevision: HEAD
    path: manifests/ai-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
