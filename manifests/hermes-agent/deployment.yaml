apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      serviceAccountName: hermes-agent
      containers:
        - name: hermes-agent
          # Собери образ из hermes-agent-src/ и загрузи в minikube:
          #   docker build -t hermes-agent:latest hermes-agent-src/
          #   minikube image load hermes-agent:latest
          image: hermes-agent:1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: hermes-agent-config
            - secretRef:
                name: hermes-agent-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
