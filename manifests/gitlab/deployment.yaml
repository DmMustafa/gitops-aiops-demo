apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:17.1.1-ce.0
          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://gitlab.local'
                puma['worker_processes'] = 2
                puma['per_worker_max_memory_mb'] = 850
                sidekiq['concurrency'] = 10
                postgresql['shared_buffers'] = "256MB"
                prometheus_monitoring['enable'] = false
                gitlab_rails['gitlab_shell_ssh_port'] = 22
                # kube-probe стучится не с loopback, а с адреса пода/узла -
                # без этого /-/readiness и /-/liveness отдают 404 и kubelet
                # считает контейнер мёртвым (см. SIGTERM в логах после провала liveness).
                gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              # Без ?all=1 GitLab проверяет только то, что процесс жив, и НЕ смотрит
              # на postgresql/redis/gitaly - поэтому под оставался Ready даже когда
              # внутренние сервисы были потушены. С ?all=1 readiness реально дергает
              # db_check/redis_check и т.д. и отдаёт 503, если что-то из них недоступно.
              path: /-/readiness?all=1
              port: 80
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              # Liveness намеренно БЕЗ all=1 - это осознанная рекомендация GitLab/K8s:
              # если сюда тоже добавить all=1, кратковременная просадка postgres/redis
              # будет убивать (restart) сам процесс, а не просто выводить под из Ready.
              path: /-/liveness
              port: 80
            initialDelaySeconds: 240
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: gitlab-data
              mountPath: /etc/gitlab
              subPath: config
            - name: gitlab-data
              mountPath: /var/log/gitlab
              subPath: logs
            - name: gitlab-data
              mountPath: /var/opt/gitlab
              subPath: data
      volumes:
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: gitlab-data
