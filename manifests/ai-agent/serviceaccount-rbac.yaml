apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent
  namespace: ai-agent
---
# Права в namespace gitlab: смотреть состояние/логи/события и лечить (restart/scale)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-agent-gitlab-access
  namespace: gitlab
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]                 # чтобы пересоздать зависший под
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]                 # чтобы выполнить gitlab-ctl restart/status внутри контейнера
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-agent-gitlab-access
  namespace: gitlab
subjects:
  - kind: ServiceAccount
    name: ai-agent
    namespace: ai-agent
roleRef:
  kind: Role
  name: ai-agent-gitlab-access
  apiGroup: rbac.authorization.k8s.io
