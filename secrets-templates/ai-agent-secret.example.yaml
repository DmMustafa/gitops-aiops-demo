# Это ШАБЛОН. Скопируй файл в secret.yaml, заполни реальными значениями
# и НЕ добавляй secret.yaml в git-репозиторий, из которого читает ArgoCD.
#
# Вариант для демо: примени вручную через
#   ./minikube kubectl -- apply -f secret.yaml
# Вариант для продакшена: используй SealedSecrets / External Secrets / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: ai-agent-secrets
  namespace: ai-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TELEGRAM_BOT_TOKEN: "123456789:AAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  TELEGRAM_CHAT_ID: "123456789"
