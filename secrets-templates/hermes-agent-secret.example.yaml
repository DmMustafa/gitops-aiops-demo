# Это ШАБЛОН. Скопируй файл в hermes-agent-secret.yaml, заполни реальными значениями
# и НЕ добавляй hermes-agent-secret.yaml в git-репозиторий, из которого читает ArgoCD.
#
#   cp hermes-agent-secret.example.yaml hermes-agent-secret.yaml
#   ./minikube kubectl -- apply -f hermes-agent-secret.yaml
#
# Как получить значения - см. README, раздел "Настройка Mattermost".
apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
type: Opaque
stringData:
  MATTERMOST_BOT_TOKEN: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  MATTERMOST_CHANNEL_ID: "abcdefghijklmnopqrstuvwxyz"
